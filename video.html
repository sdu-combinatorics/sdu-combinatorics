<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=1400" />
    <title>Video | SDU Combinatorics Group</title>

    <link rel="icon" type="image/x-icon" href="static/assets/favicon.ico" />
    <link rel="stylesheet" href="static/css/styles.css" />
    <link rel="stylesheet" href="static/css/main.css" />
    <script src="static/js/bootstrap.bundle.min.js"></script>

    <style>
        :root {
            --theme-blue-dark: #1e3c72;
            --theme-blue: #2a5298;
            --theme-blue-muted: #6c757d;
        }

        .video-card {
            background: #fff;
            border-radius: 1rem;
            box-shadow: 0 0.5rem 1rem rgba(0,0,0,0.15);
            padding: 2rem;
            margin-bottom: 2rem;
            position: relative;
            border-top: 4px solid var(--theme-blue);
        }

        .video-title {
            font-size: 2rem;
            font-weight: 700;
            color: var(--theme-blue-dark);
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .video-wrapper {
            width: 100%;
            max-width: 960px;
            margin: 0 auto;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 0.5rem 1rem rgba(0,0,0,0.18);
        }

        .video-frame {
            display: block;
            width: 100%;
            height: 540px;
            border: 0;
            background: #000;
        }

        .status-bar {
            margin-top: 1rem;
            text-align: center;
            color: var(--theme-blue-muted);
        }

        @media (max-width: 992px) {
            .video-frame {
                height: 56.25vw;
                max-height: 540px;
                min-height: 280px;
            }
        }
    </style>
</head>
<body>
    <section class="py-5">
        <div class="container px-5">
            <div id="video-container">
                <div class="text-center py-5" id="loading-spinner">
                    Loading...
                </div>
            </div>
        </div>
    </section>

    <script>
        (async function () {
            function escapeHtml(unsafe) {
                if (unsafe === null || unsafe === undefined) return '';
                return String(unsafe)
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;")
                    .replace(/'/g, "&#039;");
            }

            function isSafeUrl(url) {
                try {
                    const u = new URL(url, window.location.href);
                    return u.protocol === 'https:' || u.protocol === 'http:';
                } catch (e) {
                    return false;
                }
            }

            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            const container = document.getElementById('video-container');
            const spinner = document.getElementById('loading-spinner');

            if (!id) {
                spinner.style.display = 'none';
                container.innerHTML = '<p style="text-align:center;">Missing ?id=...</p>';
                return;
            }

            try {
                const res = await fetch('static/data/videos.json', { cache: 'no-store' });
                if (!res.ok) throw new Error('Failed to load videos.json');

                const videos = await res.json();
                const data = videos[id];

                if (!data) throw new Error(`ID "${id}" does not exist`);

                const title = data.title || 'Untitled Video';
                const embedUrl = data.embed || '';

                if (!isSafeUrl(embedUrl)) {
                    throw new Error('Invalid embed URL');
                }

                spinner.style.display = 'none';
                container.innerHTML = `
                    <div class="video-card">
                        <div class="video-title">${escapeHtml(title)}</div>
                        <div class="video-wrapper">
                            <iframe
                                class="video-frame"
                                src="${escapeHtml(embedUrl)}"
                                title="${escapeHtml(title)}"
                                loading="lazy"
                                allowfullscreen
                            ></iframe>
                        </div>
                        <div class="status-bar">
                            If it does not display, regenerate the OneDrive embed code and replace the embed URL.
                        </div>
                    </div>
                `;
            } catch (err) {
                spinner.style.display = 'none';
                container.innerHTML = `
                    <div style="text-align:center; color:#c00;">
                        ${escapeHtml(err.message)}
                    </div>
                `;
            }
        })();
    </script>
</body>
</html>
