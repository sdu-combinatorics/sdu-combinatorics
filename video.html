<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=1400" />
    <meta name="description" content="Video - SDU Combinatorics Group" />
    <meta name="author" content="SDU Combinatorics Group" />
    <title>Video | SDU Combinatorics Group</title>

    <link rel="icon" type="image/x-icon" href="static/assets/favicon.ico" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        :root {
            --bs-font-sans-serif: -apple-system, BlinkMacSystemFont, "Segoe UI",
                "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei",
                Arial, sans-serif;

            --theme-blue-dark: #1e3c72;
            --theme-blue: #2a5298;
            --theme-blue-soft: #eef4ff;
            --theme-blue-muted: #6c757d;
        }
    </style>

    <link rel="stylesheet" href="static/css/styles.css" />
    <link rel="stylesheet" href="static/css/main.css" />
    <script src="static/js/bootstrap.bundle.min.js"></script>

    <!-- HLS.js -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        .video-card {
            background: #ffffff;
            border-radius: 1rem;
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
            padding: 2rem;
            margin-bottom: 2rem;
            position: relative;
            border-top: 4px solid var(--theme-blue);
            color: #2b2b2b;
        }

        .video-card .speaker {
            font-size: 2rem;
            font-weight: 700;
            color: var(--theme-blue-dark);
            line-height: 1.25;
            padding-right: 28%;
        }

        .video-card .title {
            font-size: 1.5rem;
            font-style: italic;
            color: var(--theme-blue);
            margin-top: 0.5rem;
            line-height: 1.4;
            padding-right: 28%;
        }

        .video-card .section-label {
            font-weight: 700;
            color: var(--theme-blue-dark);
            border-bottom: 2px solid var(--theme-blue);
            display: inline-block;
            margin-bottom: 1rem;
            padding-bottom: 0.15rem;
        }

        .video-card .meta-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem 1.5rem;
            align-items: center;
            color: var(--theme-blue-muted);
            margin-top: 0.75rem;
            margin-bottom: 1.5rem;
            font-size: 0.98rem;
            line-height: 1.7;
        }

        .video-card .meta-item strong {
            color: var(--theme-blue-dark);
            font-weight: 700;
        }

        .video-card .description {
            line-height: 1.8;
            word-break: break-word;
            margin-top: 1rem;
        }

        .video-wrapper {
            width: 100%;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05);
        }

        .video-player {
            display: block;
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
        }

        .card-logo {
            position: absolute;
            top: 1rem;
            right: 1rem;
            width: 28%;
            max-width: 220px;
            height: auto;
        }

        .status-bar {
            margin-top: 1rem;
            color: var(--theme-blue-muted);
            font-size: 0.95rem;
        }

        .btn-outline-primary {
            border-color: var(--theme-blue);
            color: var(--theme-blue);
        }

        .btn-outline-primary:hover {
            background-color: var(--theme-blue);
            border-color: var(--theme-blue);
            color: #fff;
        }

        @media (max-width: 768px) {
            .video-card {
                padding: 1.5rem;
            }

            .video-card .speaker,
            .video-card .title {
                padding-right: 0;
            }

            .card-logo {
                position: static;
                display: block;
                width: 120px;
                max-width: 40%;
                margin: 0 0 1rem auto;
            }
        }
    </style>
</head>

<body>
    <nav class="header navbar navbar-expand navbar-light fixed-top shadow-sm" id="mainNav">
        <div class="container px-5">
            <a class="navbar-brand fw-bold" href="index.html">SDU Comb Group</a>
            <div class="collapse navbar-collapse" id="navbarResponsive">
                <ul class="navbar-nav ms-auto me-4 my-3 my-lg-0">
                    <li class="nav-item"><a class="nav-link me-lg-3" href="index.html">HOME</a></li>
                    <li class="nav-item"><a class="nav-link me-lg-3 active" href="seminars.html">SEMINARS</a></li>
                    <li class="nav-item"><a class="nav-link me-lg-3" href="news.html">NEWS</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="top-section" style="background-image: url('static/assets/img/background.jpeg');">
        <div class="top-section-content">
            <div class="container px-5">
                <h2 class="text-white display-3 lh-1 font-alt">&nbsp;</h2>
            </div>
        </div>
    </section>

    <section class="bg-gradient-primary-to-secondary-gray py-5" id="video-page">
        <div class="container px-5">
            <div class="mb-4">
                <a href="seminars.html" class="btn btn-outline-secondary ms-2">
                    All seminars
                </a>
            </div>

            <div id="video-container">
                <div class="text-center py-5" id="loading-spinner">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="bg-bottom text-center py-5">
        <div class="container px-5">
            <div class="text-white-50 small">
                <div id="copyright-text" class="mb-2"></div>
            </div>
        </div>
    </footer>

    <script>
        (async function () {
            function escapeHtml(unsafe) {
                if (unsafe === null || unsafe === undefined) return '';
                return String(unsafe)
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;")
                    .replace(/'/g, "&#039;");
            }

            function rawHtml(value, fallback = '') {
                return value === null || value === undefined || value === '' ? fallback : value;
            }

            function showError(container, message) {
                container.innerHTML = `
                    <div class="alert alert-danger text-center py-5" role="alert">
                        <i class="bi bi-exclamation-triangle" style="font-size: 3rem;"></i>
                        <h3 class="mt-3">Failed to Load</h3>
                        <p>${escapeHtml(message)}</p>
                        <a href="seminars.html" class="btn btn-primary mt-3">Back to Seminar List</a>
                    </div>
                `;
            }

            function updateStatus(text) {
                const el = document.getElementById('video-status');
                if (el) el.textContent = text;
            }

            function initVideoPlayer(videoEl, data) {
                const hlsUrl = data.hls || '';
                const mp4Url = data.mp4 || '';

                // 优先原生 HLS（Safari / iOS 常见）
                if (hlsUrl && videoEl.canPlayType('application/vnd.apple.mpegurl')) {
                    videoEl.src = hlsUrl;
                    updateStatus('Playing with native HLS.');
                    return;
                }

                // 其他浏览器用 hls.js
                if (hlsUrl && window.Hls && Hls.isSupported()) {
                    const hls = new Hls({
                        enableWorker: true,
                        lowLatencyMode: false,
                        backBufferLength: 90
                    });

                    hls.loadSource(hlsUrl);
                    hls.attachMedia(videoEl);

                    hls.on(Hls.Events.MANIFEST_PARSED, function () {
                        updateStatus('Adaptive streaming ready.');
                    });

                    hls.on(Hls.Events.ERROR, function (event, data) {
                        console.error('HLS error:', data);

                        if (data.fatal) {
                            if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
                                updateStatus('Network issue detected, retrying...');
                                hls.startLoad();
                            } else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
                                updateStatus('Media issue detected, recovering...');
                                hls.recoverMediaError();
                            } else {
                                hls.destroy();
                                if (mp4Url) {
                                    videoEl.src = mp4Url;
                                    updateStatus('Fell back to MP4 playback.');
                                } else {
                                    updateStatus('Unable to play this video.');
                                }
                            }
                        }
                    });

                    return;
                }

                // 最后退回 MP4
                if (mp4Url) {
                    videoEl.src = mp4Url;
                    updateStatus('Playing MP4 source.');
                    return;
                }

                updateStatus('No playable source found.');
            }

            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');

            const container = document.getElementById('video-container');
            const loadingSpinner = document.getElementById('loading-spinner');

            if (!id) {
                if (loadingSpinner) loadingSpinner.style.display = 'none';
                container.innerHTML = `
                    <div class="alert alert-warning text-center py-5" role="alert">
                        <i class="bi bi-exclamation-triangle" style="font-size: 3rem;"></i>
                        <h3 class="mt-3">Missing ID Parameter</h3>
                        <p>Please specify ?id=xxx in the URL.</p>
                        <a href="seminars.html" class="btn btn-primary mt-3">Back to Seminar List</a>
                    </div>
                `;
                return;
            }

            try {
                const response = await fetch('static/data/videos.json', { cache: 'no-store' });
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status} - Failed to load video data`);
                }

                const videosData = await response.json();
                const data = videosData[id];

                if (!data) {
                    throw new Error(`ID "${id}" does not exist`);
                }

                const html = `
                    <div id="video-card" class="video-card">
                        <img src="static/assets/img/SDU-logo.png" alt="Logo" class="card-logo">

                        <div class="speaker">${escapeHtml(data.name || 'Unknown')}</div>
                        <div class="title">${escapeHtml(data.title || 'Untitled')}</div>

                        <div class="meta-row">
                            <span class="meta-item"><strong>Date:</strong> ${escapeHtml(data.date || '')}</span>
                            ${data.duration ? `<span class="meta-item"><strong>Duration:</strong> ${escapeHtml(data.duration)}</span>` : ''}
                            ${data.category ? `<span class="meta-item"><strong>Category:</strong> ${escapeHtml(data.category)}</span>` : ''}
                        </div>

                        <div class="section-label">Video</div>
                        <div class="video-wrapper">
                            <video
                                id="main-video"
                                class="video-player"
                                controls
                                playsinline
                                preload="metadata"
                                poster="${escapeHtml(data.poster || 'static/assets/img/background.jpeg')}"
                            ></video>
                        </div>

                        <div id="video-status" class="status-bar">Preparing player...</div>

                        ${data.description ? `
                            <div class="section-label mt-4">Description</div>
                            <div class="description">${rawHtml(data.description)}</div>
                        ` : ''}
                    </div>
                `;

                if (loadingSpinner) loadingSpinner.style.display = 'none';
                container.innerHTML = html;

                const videoEl = document.getElementById('main-video');
                initVideoPlayer(videoEl, data);

            } catch (error) {
                if (loadingSpinner) loadingSpinner.style.display = 'none';
                showError(container, error.message);
            }

            const copyrightEl = document.getElementById('copyright-text');
            if (copyrightEl) {
                const year = new Date().getFullYear();
                copyrightEl.innerHTML = `© ${year} SDU Combinatorics Group. All rights reserved.`;
            }
        })();
    </script>
</body>

</html>
