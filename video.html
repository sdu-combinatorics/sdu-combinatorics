<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=1400" />

    <meta name="description" content="Video - SDU Combinatorics Group" />
    <meta name="author" content="SDU Combinatorics Group" />
    <title>Video | SDU Combinatorics Group</title>

    <!-- Icon -->
    <link rel="icon" type="image/x-icon" href="static/assets/favicon.ico" />

    <!-- Bootstrap Icons (LOCAL) -->
    <link rel="stylesheet" href="static/vendor/bootstrap-icons/bootstrap-icons.css" />

    <!-- System fonts -->
    <style>
        :root {
            --bs-font-sans-serif: -apple-system, BlinkMacSystemFont, "Segoe UI",
                "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei",
                Arial, sans-serif;

            --theme-blue-dark: #1e3c72;
            --theme-blue: #2a5298;
            --theme-blue-soft: #eef4ff;
            --theme-blue-muted: #6c757d;
        }
    </style>

    <!-- CSS -->
    <link rel="stylesheet" href="static/css/styles.css" />
    <link rel="stylesheet" href="static/css/main.css" />

    <!-- JS (LOCAL) -->
    <script src="static/js/bootstrap.bundle.min.js"></script>

    <!-- Core JS -->
    <script src="static/js/scripts.js"></script>

    <style>
        .video-card {
            background: #ffffff;
            border-radius: 1rem;
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
            padding: 2rem;
            margin-bottom: 2rem;
            position: relative;
            border-top: 4px solid var(--theme-blue);
            color: #2b2b2b;
        }

        .video-card .title {
            font-size: 2rem;
            font-weight: 700;
            color: var(--theme-blue-dark);
            line-height: 1.25;
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .video-wrapper {
            width: 100%;
            max-width: 960px;
            margin: 0 auto;
            border-radius: 1rem;
            overflow: hidden;
            background: #000;
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.18);
        }

        .video-player {
            display: block;
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
        }

        .description-wrap {
            margin-top: 1.75rem;
        }

        .section-label {
            font-weight: 700;
            color: var(--theme-blue-dark);
            border-bottom: 2px solid var(--theme-blue);
            display: inline-block;
            margin-bottom: 1rem;
            padding-bottom: 0.15rem;
        }

        .description-content {
            line-height: 1.8;
            word-break: break-word;
        }

        @media (max-width: 768px) {
            .video-card {
                padding: 1.5rem;
            }

            .video-card .title {
                font-size: 1.5rem;
            }
        }
    </style>
</head>

<body>
    <!-- Navigation -->
    <nav class="header navbar navbar-expand navbar-light fixed-top shadow-sm" id="mainNav">
        <div class="container px-5">
            <a id="page-top-title" class="navbar-brand fw-bold" href="index.html">SDU Comb Group</a>

            <div class="collapse navbar-collapse show" id="navbarResponsive">
                <ul class="navbar-nav ms-auto me-4 my-3 my-lg-0">
                    <li class="nav-item">
                        <a class="nav-link me-lg-3" href="index.html">HOME</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link me-lg-3 active" href="seminars.html">SEMINARS</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link me-lg-3" href="news.html">NEWS</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Top Section -->
    <section class="top-section" style="background-image: url('static/assets/img/background.jpeg');">
        <div class="top-section-content">
            <div class="container px-5">
                <h2 class="text-white display-3 lh-1 font-alt">&nbsp;</h2>
            </div>
        </div>
    </section>

    <!-- Video -->
    <section class="bg-gradient-primary-to-secondary-gray py-5" id="video-page">
        <div class="container px-5">
            <div class="mb-4">
                <a href="seminars.html" class="btn btn-outline-secondary ms-2">
                    All seminars
                </a>
            </div>

            <div id="video-container">
                <div class="text-center py-5" id="loading-spinner">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-bottom text-center py-5">
        <div class="container px-5">
            <div class="text-white-50 small">
                <div id="copyright-text" class="mb-2"></div>
            </div>
        </div>
    </footer>

    <script>
        (function () {
            function escapeHtml(str) {
                if (str === null || str === undefined) return '';
                return String(str)
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#039;');
            }

            function rawHtml(value, fallback = '') {
                return value === null || value === undefined || value === '' ? fallback : value;
            }

            function isSafeUrl(url) {
                try {
                    const u = new URL(url, window.location.href);
                    return u.protocol === 'https:' || u.protocol === 'http:';
                } catch (e) {
                    return false;
                }
            }

            function setCopyright() {
                const copyrightEl = document.getElementById('copyright-text');
                if (copyrightEl) {
                    const year = new Date().getFullYear();
                    copyrightEl.innerHTML = `© ${year} SDU Combinatorics Group. All rights reserved.`;
                }
            }

            function renderError(message) {
                const container = document.getElementById('video-container');
                container.innerHTML = `
                    <div class="alert alert-danger text-center py-5" role="alert">
                        <i class="bi bi-exclamation-triangle" style="font-size: 3rem;"></i>
                        <h3 class="mt-3">Failed to Load</h3>
                        <p>${escapeHtml(message)}</p>
                        <a href="seminars.html" class="btn btn-primary mt-3">Back to Seminar List</a>
                    </div>
                `;
            }

            async function init() {
                setCopyright();

                const params = new URLSearchParams(window.location.search);
                const id = params.get('id');

                if (!id) {
                    renderError('Missing URL parameter: ?id=...');
                    return;
                }

                try {
                    const response = await fetch('static/data/videos.json', { cache: 'no-store' });
                    if (!response.ok) {
                        throw new Error('Failed to load static/data/videos.json');
                    }

                    const videos = await response.json();
                    const item = videos[id];

                    if (!item) {
                        throw new Error(`ID "${id}" does not exist in videos.json`);
                    }

                    const title = item.title || 'Untitled Video';
                    const mp4 = item.mp4 || item.url || '';
                    const poster = item.poster || '';
                    const description = item.description || '';

                    if (!isSafeUrl(mp4)) {
                        throw new Error('No valid mp4 URL found in videos.json');
                    }

                    const container = document.getElementById('video-container');
                    container.innerHTML = `
                        <div class="video-card">
                            <div class="title">${escapeHtml(title)}</div>

                            <div class="video-wrapper">
                                <video
                                    id="video-player"
                                    class="video-player"
                                    controls
                                    playsinline
                                    preload="metadata"
                                    ${poster ? `poster="${escapeHtml(poster)}"` : ''}
                                ></video>
                            </div>

                            ${description ? `
                                <div class="description-wrap">
                                    <div class="section-label">Description</div>
                                    <div class="description-content">${rawHtml(description)}</div>
                                </div>
                            ` : ''}
                        </div>
                    `;

                    const video = document.getElementById('video-player');
                    video.src = mp4;
                } catch (error) {
                    renderError(error.message);
                }
            }

            init();
        })();
    </script>
</body>

</html>
