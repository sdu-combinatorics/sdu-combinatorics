<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=1400" />

    <meta name="description" content="Video - SDU Combinatorics Group" />
    <meta name="author" content="SDU Combinatorics Group" />
    <title>Video | SDU Combinatorics Group</title>

    <link rel="icon" type="image/x-icon" href="static/assets/favicon.ico" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="static/css/styles.css" />
    <link rel="stylesheet" href="static/css/main.css" />
    <script src="static/js/bootstrap.bundle.min.js"></script>

    <style>
        :root {
            --bs-font-sans-serif: -apple-system, BlinkMacSystemFont, "Segoe UI",
                "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei",
                Arial, sans-serif;

            --theme-blue-dark: #1e3c72;
            --theme-blue: #2a5298;
            --theme-blue-soft: #eef4ff;
            --theme-blue-muted: #6c757d;
        }

        .video-card {
            background: #ffffff;
            border-radius: 1rem;
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
            padding: 2rem;
            margin-bottom: 2rem;
            position: relative;
            border-top: 4px solid var(--theme-blue);
            color: #2b2b2b;
        }

        .video-card .title {
            font-size: 2rem;
            font-weight: 700;
            color: var(--theme-blue-dark);
            line-height: 1.25;
            text-align: center;
            margin-bottom: 1.5rem;
            padding: 0 1rem;
        }

        .video-embed-wrapper {
            width: 100%;
            max-width: 960px;
            margin: 0 auto;
            border-radius: 16px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.18);
        }

        .video-embed-frame {
            display: block;
            width: 100%;
            height: 540px;
            border: 0;
            background: #000;
        }

        .status-bar {
            margin-top: 1rem;
            color: var(--theme-blue-muted);
            font-size: 0.95rem;
            text-align: center;
        }

        .action-row {
            margin-top: 1rem;
            text-align: center;
        }

        .btn-outline-primary {
            border-color: var(--theme-blue);
            color: var(--theme-blue);
        }

        .btn-outline-primary:hover {
            background-color: var(--theme-blue);
            border-color: var(--theme-blue);
            color: #fff;
        }

        .description {
            line-height: 1.8;
            word-break: break-word;
            margin-top: 1.5rem;
        }

        .section-label {
            font-weight: 700;
            color: var(--theme-blue-dark);
            border-bottom: 2px solid var(--theme-blue);
            display: inline-block;
            margin-bottom: 1rem;
            padding-bottom: 0.15rem;
        }

        .card-logo {
            position: absolute;
            top: 1rem;
            right: 1rem;
            width: 22%;
            max-width: 180px;
            height: auto;
        }

        @media (max-width: 992px) {
            .video-embed-frame {
                height: 56.25vw;
                max-height: 540px;
                min-height: 280px;
            }
        }

        @media (max-width: 768px) {
            .video-card {
                padding: 1.5rem;
            }

            .video-card .title {
                font-size: 1.5rem;
                padding: 0;
            }

            .card-logo {
                position: static;
                display: block;
                width: 120px;
                max-width: 40%;
                margin: 0 0 1rem auto;
            }
        }
    </style>
</head>

<body>
    <nav class="header navbar navbar-expand navbar-light fixed-top shadow-sm" id="mainNav">
        <div class="container px-5">
            <a class="navbar-brand fw-bold" href="index.html">SDU Comb Group</a>
            <div class="collapse navbar-collapse" id="navbarResponsive">
                <ul class="navbar-nav ms-auto me-4 my-3 my-lg-0">
                    <li class="nav-item"><a class="nav-link me-lg-3" href="index.html">HOME</a></li>
                    <li class="nav-item"><a class="nav-link me-lg-3 active" href="seminars.html">SEMINARS</a></li>
                    <li class="nav-item"><a class="nav-link me-lg-3" href="news.html">NEWS</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="top-section" style="background-image: url('static/assets/img/background.jpeg');">
        <div class="top-section-content">
            <div class="container px-5">
                <h2 class="text-white display-3 lh-1 font-alt">&nbsp;</h2>
            </div>
        </div>
    </section>

    <section class="bg-gradient-primary-to-secondary-gray py-5" id="video-page">
        <div class="container px-5">
            <div class="mb-4">
                <a href="seminars.html" class="btn btn-outline-secondary ms-2">
                    All seminars
                </a>
            </div>

            <div id="video-container">
                <div class="text-center py-5" id="loading-spinner">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="bg-bottom text-center py-5">
        <div class="container px-5">
            <div class="text-white-50 small">
                <div id="copyright-text" class="mb-2"></div>
            </div>
        </div>
    </footer>

    <script>
        (async function () {
            function escapeHtml(unsafe) {
                if (unsafe === null || unsafe === undefined) return '';
                return String(unsafe)
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;")
                    .replace(/'/g, "&#039;");
            }

            function rawHtml(value, fallback = '') {
                return value === null || value === undefined || value === '' ? fallback : value;
            }

            function isSafeUrl(url) {
                try {
                    const u = new URL(url, window.location.href);
                    return u.protocol === 'https:' || u.protocol === 'http:';
                } catch (e) {
                    return false;
                }
            }

            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');

            const container = document.getElementById('video-container');
            const loadingSpinner = document.getElementById('loading-spinner');

            if (!id) {
                if (loadingSpinner) loadingSpinner.style.display = 'none';
                container.innerHTML = `
                    <div class="alert alert-warning text-center py-5" role="alert">
                        <i class="bi bi-exclamation-triangle" style="font-size: 3rem;"></i>
                        <h3 class="mt-3">Missing ID Parameter</h3>
                        <p>Please specify ?id=xxx in the URL.</p>
                        <a href="seminars.html" class="btn btn-primary mt-3">Back to Seminar List</a>
                    </div>
                `;
                return;
            }

            try {
                const response = await fetch('static/data/videos.json', { cache: 'no-store' });
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status} - Failed to load video data`);
                }

                const videosData = await response.json();
                const data = videosData[id];

                if (!data) {
                    throw new Error(`ID "${id}" does not exist`);
                }

                const title = data.title || 'Untitled Video';
                const overdriveUrl = data.overdrive || data.url || '';
                const description = data.description || '';

                if (!overdriveUrl || !isSafeUrl(overdriveUrl)) {
                    throw new Error(`No valid Overdrive URL found for ID "${id}"`);
                }

                const html = `
                    <div id="video-card" class="video-card">
                        <img src="static/assets/img/SDU-logo.png" alt="Logo" class="card-logo">

                        <div class="title">${escapeHtml(title)}</div>

                        <div class="video-embed-wrapper">
                            <iframe
                                id="video-frame"
                                class="video-embed-frame"
                                src="${escapeHtml(overdriveUrl)}"
                                loading="lazy"
                                allow="autoplay; fullscreen; picture-in-picture"
                                allowfullscreen
                                referrerpolicy="strict-origin-when-cross-origin"
                                title="${escapeHtml(title)}"
                            ></iframe>
                        </div>

                        <div class="status-bar">
                            If the embedded player does not load, please open it in a new tab.
                        </div>

                        <div class="action-row">
                            <a class="btn btn-outline-primary" href="${escapeHtml(overdriveUrl)}" target="_blank" rel="noopener">
                                Open video in new tab
                            </a>
                        </div>

                        ${description ? `
                            <div class="mt-4">
                                <div class="section-label">Description</div>
                                <div class="description">${rawHtml(description)}</div>
                            </div>
                        ` : ''}
                    </div>
                `;

                if (loadingSpinner) loadingSpinner.style.display = 'none';
                container.innerHTML = html;

            } catch (error) {
                if (loadingSpinner) loadingSpinner.style.display = 'none';
                container.innerHTML = `
                    <div class="alert alert-danger text-center py-5" role="alert">
                        <i class="bi bi-exclamation-triangle" style="font-size: 3rem;"></i>
                        <h3 class="mt-3">Failed to Load</h3>
                        <p>${escapeHtml(error.message)}</p>
                        <a href="seminars.html" class="btn btn-primary mt-3">Back to Seminar List</a>
                    </div>
                `;
            }

            const copyrightEl = document.getElementById('copyright-text');
            if (copyrightEl) {
                const year = new Date().getFullYear();
                copyrightEl.innerHTML = `© ${year} SDU Combinatorics Group. All rights reserved.`;
            }
        })();
    </script>
</body>

</html>
