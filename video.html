<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=1400" />

    <meta name="description" content="Video - SDU Combinatorics Group" />
    <meta name="author" content="SDU Combinatorics Group" />
    <title>Video | SDU Combinatorics Group</title>

    <!-- Icon -->
    <link rel="icon" type="image/x-icon" href="static/assets/favicon.ico" />

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- System fonts -->
    <style>
        :root {
            --bs-font-sans-serif: -apple-system, BlinkMacSystemFont, "Segoe UI",
                "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei",
                Arial, sans-serif;

            --theme-blue-dark: #1e3c72;
            --theme-blue: #2a5298;
            --theme-blue-soft: #eef4ff;
            --theme-blue-muted: #6c757d;
        }
    </style>

    <!-- CSS -->
    <link rel="stylesheet" href="static/css/styles.css" />
    <link rel="stylesheet" href="static/css/main.css" />

    <!-- JS -->
    <script src="static/js/bootstrap.bundle.min.js"></script>

    <style>
        .video-card {
            background: #ffffff;
            border-radius: 1rem;
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
            padding: 2rem;
            margin-bottom: 2rem;
            position: relative;
            border-top: 4px solid var(--theme-blue);
            color: #2b2b2b;
        }

        .video-card .title {
            font-size: 2rem;
            font-weight: 700;
            color: var(--theme-blue-dark);
            line-height: 1.25;
            padding-right: 28%;
        }

        .video-card .subtitle {
            font-size: 1.05rem;
            color: var(--theme-blue-muted);
            margin-top: 0.75rem;
            margin-bottom: 1.25rem;
            line-height: 1.7;
        }

        .video-card .meta-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem 1.5rem;
            align-items: center;
            color: var(--theme-blue-muted);
            margin-top: 0.25rem;
            margin-bottom: 1.5rem;
            font-size: 0.98rem;
            line-height: 1.7;
        }

        .video-card .meta-item {
            white-space: nowrap;
        }

        .video-card .meta-item strong {
            color: var(--theme-blue-dark);
            font-weight: 700;
        }

        .video-label {
            font-weight: 700;
            color: var(--theme-blue-dark);
            border-bottom: 2px solid var(--theme-blue);
            display: inline-block;
            margin-bottom: 1rem;
            padding-bottom: 0.15rem;
        }

        .video-wrapper {
            margin-top: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .video-wrapper video {
            width: 100%;
            max-width: 100%;
            display: block;
            border-radius: 0.85rem;
            background: #000;
            box-shadow: 0 0.35rem 1rem rgba(0, 0, 0, 0.12);
        }

        .video-note {
            border-left: 4px solid var(--theme-blue);
            background-color: var(--theme-blue-soft);
            font-size: 0.96rem;
            padding: 1rem;
            border-radius: 0.5rem;
            line-height: 1.7;
            color: #2f3d57;
        }

        .video-note strong {
            color: var(--theme-blue-dark);
        }

        .card-logo {
            position: absolute;
            top: 1rem;
            right: 1rem;
            width: 28%;
            max-width: 220px;
            height: auto;
        }

        @media (max-width: 768px) {
            .video-card {
                padding: 1.5rem;
            }

            .video-card .title {
                padding-right: 0;
            }

            .card-logo {
                position: static;
                display: block;
                width: 120px;
                max-width: 40%;
                margin: 0 0 1rem auto;
            }

            .video-card .meta-item {
                white-space: normal;
            }
        }
    </style>
</head>

<body>
    <!-- Navigation -->
    <nav class="header navbar navbar-expand navbar-light fixed-top shadow-sm" id="mainNav">
        <div class="container px-5">
            <a class="navbar-brand fw-bold" href="index.html">SDU Comb Group</a>
            <div class="collapse navbar-collapse" id="navbarResponsive">
                <ul class="navbar-nav ms-auto me-4 my-3 my-lg-0">
                    <li class="nav-item"><a class="nav-link me-lg-3" href="index.html">HOME</a></li>
                    <li class="nav-item"><a class="nav-link me-lg-3 active" href="seminars.html">SEMINARS</a></li>
                    <li class="nav-item"><a class="nav-link me-lg-3" href="news.html">NEWS</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Top Section -->
    <section class="top-section" style="background-image: url('static/assets/img/background.jpeg');">
        <div class="top-section-content">
            <div class="container px-5">
                <h2 class="text-white display-3 lh-1 font-alt">&nbsp;</h2>
            </div>
        </div>
    </section>

    <!-- Video Content -->
    <section class="bg-gradient-primary-to-secondary-gray py-5" id="video-page">
        <div class="container px-5">
            <div class="mb-4">
                <a href="seminars.html" class="btn btn-outline-secondary ms-2">
                    All seminars
                </a>
            </div>

            <div id="video-container">
                <div class="text-center py-5" id="loading-spinner">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-bottom text-center py-5">
        <div class="container px-5">
            <div class="text-white-50 small">
                <div id="copyright-text" class="mb-2"></div>
            </div>
        </div>
    </footer>

    <script>
        (function () {
            function escapeHtml(unsafe) {
                if (unsafe === null || unsafe === undefined) return '';
                return String(unsafe)
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;")
                    .replace(/'/g, "&#039;");
            }

            function decodeParam(value, fallback = '') {
                return value === null || value === undefined || value === '' ? fallback : value;
            }

            function looksLikeDirectPath(value) {
                return /^(https?:)?\/\//i.test(value) ||
                       value.startsWith('/') ||
                       value.startsWith('./') ||
                       value.startsWith('../') ||
                       value.includes('/');
            }

            function buildVideoSrc(id) {
                const videoBasePath = 'static/video/';
                if (!id) return '';
                return looksLikeDirectPath(id) ? id : videoBasePath + id;
            }

            function guessTitleFromId(id) {
                if (!id) return 'Seminar Video';
                const cleaned = id.split('/').pop().replace(/\.[^.]+$/, '');
                return cleaned || 'Seminar Video';
            }

            const urlParams = new URLSearchParams(window.location.search);
            const rawId = urlParams.get('id');
            const title = decodeParam(urlParams.get('title'), guessTitleFromId(rawId));
            const speaker = decodeParam(urlParams.get('speaker'), '');
            const date = decodeParam(urlParams.get('date'), '');
            const note = decodeParam(
                urlParams.get('note'),
                'This video is provided for academic communication and learning.'
            );
            const poster = decodeParam(urlParams.get('poster'), '');

            const container = document.getElementById('video-container');
            const loadingSpinner = document.getElementById('loading-spinner');

            if (!rawId) {
                if (loadingSpinner) loadingSpinner.style.display = 'none';
                container.innerHTML = `
                    <div class="alert alert-warning text-center py-5" role="alert">
                        <i class="bi bi-exclamation-triangle" style="font-size: 3rem;"></i>
                        <h3 class="mt-3">Missing Video Parameter</h3>
                        <p>Please specify ?id=your-video-file.mp4 in the URL.</p>
                        <a href="seminars.html" class="btn btn-primary mt-3">Back to Seminar List</a>
                    </div>
                `;
                return;
            }

            const videoSrc = buildVideoSrc(rawId);

            const metaParts = [];
            if (speaker) {
                metaParts.push(`
                    <span class="meta-item">
                        <strong>Speaker:</strong> ${escapeHtml(speaker)}
                    </span>
                `);
            }
            if (date) {
                metaParts.push(`
                    <span class="meta-item">
                        <strong>Date:</strong> ${escapeHtml(date)}
                    </span>
                `);
            }

            const posterAttr = poster ? ` poster="${escapeHtml(poster)}"` : '';

            const cardHtml = `
                <div class="video-card">
                    <img src="static/assets/img/SDU-logo.png" alt="Logo" class="card-logo">

                    <div class="title">${escapeHtml(title)}</div>
                    <div class="subtitle">Seminar Video</div>

                    ${metaParts.length ? `<div class="meta-row">${metaParts.join('')}</div>` : ''}

                    <div class="video-label">Video</div>
                    <div class="video-wrapper">
                        <video controls preload="metadata"${posterAttr}>
                            <source src="${escapeHtml(videoSrc)}" type="video/mp4">
                            Your browser does not support the video tag.
                        </video>
                    </div>

                    <div class="video-note">
                        <strong>Note:</strong> ${escapeHtml(note)}
                    </div>
                </div>
            `;

            if (loadingSpinner) loadingSpinner.style.display = 'none';
            container.innerHTML = cardHtml;

            const copyrightEl = document.getElementById('copyright-text');
            if (copyrightEl) {
                const year = new Date().getFullYear();
                copyrightEl.innerHTML = `© ${year} SDU Combinatorics Group. All rights reserved.`;
            }
        })();
    </script>
</body>

</html>
