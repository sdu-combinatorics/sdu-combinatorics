<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Video | SDU Combinatorics Group</title>

    <style>
        :root {
            --theme-blue-dark: #1e3c72;
            --theme-blue: #2a5298;
            --theme-blue-muted: #6c757d;
            --theme-bg: #f5f7fb;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei",
                Arial, sans-serif;
            background: var(--theme-bg);
            color: #222;
        }

        .topbar {
            background: #fff;
            border-bottom: 1px solid #e5e7eb;
            padding: 16px 24px;
            font-weight: 700;
            color: var(--theme-blue-dark);
        }

        .page {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: var(--theme-blue);
            text-decoration: none;
            font-size: 15px;
        }

        .card {
            background: #fff;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            border-top: 4px solid var(--theme-blue);
            padding: 28px;
        }

        .title {
            font-size: 32px;
            font-weight: 700;
            line-height: 1.3;
            color: var(--theme-blue-dark);
            text-align: center;
            margin-bottom: 24px;
        }

        .player-wrap {
            max-width: 960px;
            margin: 0 auto;
            border-radius: 16px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
        }

        video {
            display: block;
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
        }

        .status {
            margin-top: 14px;
            text-align: center;
            color: var(--theme-blue-muted);
            font-size: 14px;
            line-height: 1.7;
        }

        .actions {
            margin-top: 18px;
            text-align: center;
        }

        .btn {
            display: inline-block;
            padding: 10px 16px;
            border: 1px solid var(--theme-blue);
            border-radius: 10px;
            color: var(--theme-blue);
            background: #fff;
            text-decoration: none;
            font-size: 15px;
            cursor: pointer;
        }

        .btn:hover {
            background: var(--theme-blue);
            color: #fff;
        }

        .error-box {
            background: #fff3f3;
            border: 1px solid #f3c2c2;
            color: #9f1d1d;
            border-radius: 14px;
            padding: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="topbar">SDU Comb Group</div>

    <div class="page">
        <a class="back-link" href="./seminars.html">← All seminars</a>

        <div id="video-container">
            <div class="card">
                <div class="status">Loading...</div>
            </div>
        </div>
    </div>

    <script>
        (async function () {
            function escapeHtml(str) {
                if (str === null || str === undefined) return '';
                return String(str)
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#039;');
            }

            function isSafeUrl(url) {
                try {
                    const u = new URL(url, window.location.href);
                    return u.protocol === 'https:' || u.protocol === 'http:';
                } catch (e) {
                    return false;
                }
            }

            function renderError(message) {
                const container = document.getElementById('video-container');
                container.innerHTML = `<div class="error-box">${escapeHtml(message)}</div>`;
            }

            function setStatus(text) {
                const el = document.getElementById('status');
                if (el) el.textContent = text;
            }

            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');

            if (!id) {
                renderError('Missing URL parameter: ?id=...');
                return;
            }

            try {
                const res = await fetch('./static/data/videos.json', { cache: 'no-store' });
                if (!res.ok) throw new Error('Failed to load ./static/data/videos.json');

                const videos = await res.json();
                const item = videos[id];
                if (!item) throw new Error('This id does not exist in videos.json');

                const title = item.title || 'Untitled Video';
                const mp4 = item.mp4 || item.url || '';
                const poster = item.poster || '';

                if (!isSafeUrl(mp4)) {
                    throw new Error('No valid mp4 URL found in videos.json');
                }

                document.getElementById('video-container').innerHTML = `
                    <div class="card">
                        <div class="title">${escapeHtml(title)}</div>

                        <div class="player-wrap">
                            <video
                                id="video-player"
                                controls
                                playsinline
                                preload="metadata"
                                ${poster ? `poster="${escapeHtml(poster)}"` : ''}
                            ></video>
                        </div>

                        <div id="status" class="status">Preparing player...</div>

                        <div class="actions">
                            <a class="btn" href="${escapeHtml(mp4)}" target="_blank" rel="noopener">
                                Open raw video link
                            </a>
                        </div>
                    </div>
                `;

                const video = document.getElementById('video-player');
                video.src = mp4;

                video.addEventListener('loadedmetadata', () => {
                    setStatus('Video metadata loaded.');
                });

                video.addEventListener('canplay', () => {
                    setStatus('Video ready to play.');
                });

                video.addEventListener('error', () => {
                    const err = video.error;
                    setStatus('HTML5 video error: ' + (err ? err.code : 'unknown'));
                });

                setStatus('Playing MP4 source.');
            } catch (err) {
                renderError(err.message);
            }
        })();
    </script>
</body>
</html>
